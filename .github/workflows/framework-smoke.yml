name: Framework Smoke

# Vue / Svelte / React fixture에서 jogak dev 마운트 + iframe scope의 어댑터 dispatch가
# 정상 동작하는지 확인하는 e2e smoke.
#
# beta.4의 axe-core vite 정적 스캔 회귀는 Vue/Svelte smoke가 catch — VR은 chrome
# scope만 검증하므로 iframe scope 어댑터 dispatch 결함은 smoke만 catch. React도
# 동일 결함 가능성이 있어 matrix 확장.
#
# Next / WC 어댑터는 초기 컴파일 오버헤드(Next 30초+) 또는 별도 fixture 미준비로
# 본 smoke에서 제외. VR + test-case/jogak-{next,nuxt}-shop이 대체 커버.

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'packages/ui/**'
      - 'apps/jogak-vue-test/**'
      - 'apps/jogak-svelte-test/**'
      - 'apps/jogak-vite-test/**'
      - 'e2e/framework-smoke.mjs'
      - '.github/workflows/framework-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'packages/ui/**'
      - 'apps/jogak-vue-test/**'
      - 'apps/jogak-svelte-test/**'
      - 'apps/jogak-vite-test/**'
      - 'e2e/framework-smoke.mjs'
      - '.github/workflows/framework-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.fixture }} iframe mount
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        fixture: [vue, svelte, react]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core / ui / cli
        run: pnpm --filter @jogak/core --filter @jogak/ui --filter @jogak/cli build

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke ${{ matrix.fixture }}
        run: node e2e/framework-smoke.mjs --fixture=${{ matrix.fixture }}
