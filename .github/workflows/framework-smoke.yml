name: Framework Smoke

# Vue / Svelte fixture에서 jogak dev 마운트 + iframe scope의 어댑터 dispatch가
# 정상 동작하는지 확인하는 e2e smoke.
#
# beta.4의 axe-core vite 정적 스캔 회귀는 Vue/Svelte smoke가 catch — VR은 chrome
# scope만 검증하므로 iframe scope 어댑터 dispatch 결함은 smoke만 catch.
#
# React는 jogak-vite-test가 tailwind v4 + globalCss라 CI cold prebundling
# 오래 걸림 — timeout 60s로 확장 후 matrix 편입. Next / WC는 별도 fixture
# 문제(Next 30s+ 초기 컴파일, WC dev command 없음)로 제외.

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'packages/ui/**'
      - 'apps/jogak-vue-test/**'
      - 'apps/jogak-svelte-test/**'
      - 'apps/jogak-vite-test/**'
      - 'e2e/framework-smoke.mjs'
      - '.github/workflows/framework-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'packages/ui/**'
      - 'apps/jogak-vue-test/**'
      - 'apps/jogak-svelte-test/**'
      - 'apps/jogak-vite-test/**'
      - 'e2e/framework-smoke.mjs'
      - '.github/workflows/framework-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.fixture }} iframe mount
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # react는 jogak-vite-test가 tailwind v4 + globalCss를 사용해 CI cold
        # prebundling이 40s+ 걸림. timeout 60s로 확장 후 재편입.
        fixture: [vue, svelte, react]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core / ui / cli
        run: pnpm --filter @jogak/core --filter @jogak/ui --filter @jogak/cli build

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke ${{ matrix.fixture }}
        run: node e2e/framework-smoke.mjs --fixture=${{ matrix.fixture }}
