name: Framework Smoke

# Vue / Svelte fixture에서 jogak dev 마운트 + iframe scope의 어댑터 dispatch가
# 정상 동작하는지 확인하는 e2e smoke.
#
# beta.4의 axe-core vite 정적 스캔 회귀는 Vue/Svelte smoke가 catch — VR은 chrome
# scope만 검증하므로 iframe scope 어댑터 dispatch 결함은 smoke만 catch.
#
# React fixture는 준비됐지만(apps/jogak-vite-test/src/components/Hello*) CI runner
# 환경에서 40s 이상 걸려 timeout — 로컬 clean state에서는 <10s. 원인 진단 후
# matrix에 편입 예정 (followup). Next / WC는 별도 fixture 문제로 제외.

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'packages/ui/**'
      - 'apps/jogak-vue-test/**'
      - 'apps/jogak-svelte-test/**'
      - 'apps/jogak-vite-test/**'
      - 'e2e/framework-smoke.mjs'
      - '.github/workflows/framework-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'packages/ui/**'
      - 'apps/jogak-vue-test/**'
      - 'apps/jogak-svelte-test/**'
      - 'apps/jogak-vite-test/**'
      - 'e2e/framework-smoke.mjs'
      - '.github/workflows/framework-smoke.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.fixture }} iframe mount
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # 1.0.0-beta.5: react는 로컬 clean state에서 <10s에 성공하지만 CI ubuntu
        # runner에서 40s 이상 걸림 (vue/svelte는 60s 이내 성공). 원인 진단 followup
        # 필요. fixture 파일(apps/jogak-vite-test/src/components/Hello*)은 유지해
        # 로컬 회귀 catch에 활용.
        fixture: [vue, svelte]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core / ui / cli
        run: pnpm --filter @jogak/core --filter @jogak/ui --filter @jogak/cli build

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke ${{ matrix.fixture }}
        run: node e2e/framework-smoke.mjs --fixture=${{ matrix.fixture }}
