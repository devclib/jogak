name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Upgrade npm CLI to 11+ (OIDC publish 정식 지원 11.5.1+)
        # --force: Node 동봉 npm 10.x가 self-upgrade 시 의존성 모듈을 잃는 알려진 버그 회피
        run: npm install -g npm@11 --force

      - name: Verify npm version + clean .npmrc auth (OIDC fallback 보장)
        run: |
          npm --version
          # setup-node가 박아둔 _authToken 라인이 있으면 OIDC 흐름이 막힘.
          # registry-url을 제거했으니 normally 없지만 안전하게 정리.
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc" || true
            echo "--- ~/.npmrc after cleanup ---"
            cat "$HOME/.npmrc" || true
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist parity (no test files leaked)
        run: |
          leaked=$(find packages -path '*/dist/*' -name '*.test.*' || true)
          if [ -n "$leaked" ]; then
            echo "::error::test files leaked into dist:"
            echo "$leaked"
            exit 1
          fi

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: pnpm -r --filter './packages/*' publish --access public --no-git-checks --dry-run

      - name: Publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: pnpm -r --filter './packages/*' publish --access public --no-git-checks
