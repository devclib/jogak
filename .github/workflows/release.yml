name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify versions + clean ~/.npmrc auth (OIDC fallback 보장)
        # Node 24는 npm 11.x를 동봉 → self-upgrade 불필요.
        # _authToken 라인이 ~/.npmrc에 박혀 있으면 OIDC fallback이 차단되므로 안전 정리.
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc" || true
            echo "--- ~/.npmrc after cleanup ---"
            cat "$HOME/.npmrc" || true
          else
            echo "(no ~/.npmrc)"
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist parity (no test files leaked)
        run: |
          leaked=$(find packages -path '*/dist/*' -name '*.test.*' || true)
          if [ -n "$leaked" ]; then
            echo "::error::test files leaked into dist:"
            echo "$leaked"
            exit 1
          fi

      - name: Pack all packages (workspace:* → 실제 버전 치환)
        # pnpm pack이 workspace:*를 패키지 버전으로 치환한 tarball을 생성한다.
        # 이후 npm publish에 tarball을 직접 넘기면 npm CLI(11+)의 OIDC 인증 흐름을 정확히 탄다.
        run: |
          mkdir -p /tmp/jogak-tgz
          for pkg in core react ui web-components next cli; do
            (cd packages/$pkg && pnpm pack --pack-destination /tmp/jogak-tgz)
          done
          ls -la /tmp/jogak-tgz

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          cd /tmp/jogak-tgz
          for pkg in core react ui web-components next cli; do
            echo "=== dry-run: @jogak/$pkg ==="
            npm publish jogak-$pkg-*.tgz --access public --provenance --dry-run
          done

      - name: Publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: |
          cd /tmp/jogak-tgz
          # 의존성 순서: core → react → ui → web-components → next → cli
          for pkg in core react ui web-components next cli; do
            echo "=== publishing @jogak/$pkg ==="
            npm publish jogak-$pkg-*.tgz --access public --provenance
          done
