name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify versions + clean ~/.npmrc auth (OIDC fallback 보장)
        # Node 24는 npm 11.x를 동봉 → self-upgrade 불필요.
        # _authToken 라인이 ~/.npmrc에 박혀 있으면 OIDC fallback이 차단되므로 안전 정리.
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc" || true
            echo "--- ~/.npmrc after cleanup ---"
            cat "$HOME/.npmrc" || true
          else
            echo "(no ~/.npmrc)"
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist parity (no test files leaked)
        run: |
          leaked=$(find packages -path '*/dist/*' -name '*.test.*' || true)
          if [ -n "$leaked" ]; then
            echo "::error::test files leaked into dist:"
            echo "$leaked"
            exit 1
          fi

      - name: Pack all packages (workspace:* → 실제 버전 치환)
        # pnpm pack이 workspace:*를 패키지 버전으로 치환한 tarball을 생성한다.
        # 이후 npm publish에 tarball을 직접 넘기면 npm CLI(11+)의 OIDC 인증 흐름을 정확히 탄다.
        run: |
          mkdir -p /tmp/jogak-tgz
          for pkg in core ui cli; do
            (cd packages/$pkg && pnpm pack --pack-destination /tmp/jogak-tgz)
          done
          ls -la /tmp/jogak-tgz

      - name: Resolve dist-tag from version
        # 버전의 semver prerelease identifier로 npm dist-tag를 자동 결정한다.
        # 0.1.0-alpha.2 → alpha, 1.0.0-beta.0 → beta, 1.0.0 → latest
        # 하드코딩 시 stable 릴리스가 alpha 태그로 올라가 latest를 갱신 못 하는 사고 방지.
        id: dist-tag
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          case "$VERSION" in
            *-alpha.*) TAG=alpha ;;
            *-beta.*)  TAG=beta ;;
            *-rc.*)    TAG=rc ;;
            *-*)       TAG=next ;;
            *)         TAG=latest ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "Resolved: $VERSION → dist-tag=$TAG"

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          cd /tmp/jogak-tgz
          DIST_TAG='${{ steps.dist-tag.outputs.tag }}'
          for pkg in core ui cli; do
            PKG_VER=$(node -p "require(\"$GITHUB_WORKSPACE/packages/$pkg/package.json\").version")
            TGZ="jogak-${pkg}-${PKG_VER}.tgz"
            EXISTS=$(npm view "@jogak/$pkg@$PKG_VER" version 2>/dev/null || true)
            if [ -n "$EXISTS" ]; then
              echo "=== dry-run skip @jogak/$pkg@$PKG_VER (already published) ==="
              continue
            fi
            echo "=== dry-run: @jogak/$pkg@$PKG_VER ==="
            npm publish "$TGZ" --access public --provenance --tag "$DIST_TAG" --dry-run
          done

      - name: Publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: |
          cd /tmp/jogak-tgz
          # 알파.11.1: 각 패키지의 local version이 npm registry에 이미 존재하면 skip.
          # 한 패키지(예: cli)만 patch bump했을 때 core/ui의 동일 버전을 재-publish하다
          # E403으로 CI가 깨지는 회귀를 방지. 의존성 순서(core → ui → cli)는 유지.
          DIST_TAG='${{ steps.dist-tag.outputs.tag }}'
          for pkg in core ui cli; do
            PKG_VER=$(node -p "require('/__w/jogak/jogak/packages/$pkg/package.json').version" 2>/dev/null \
              || node -p "require(\"$GITHUB_WORKSPACE/packages/$pkg/package.json\").version")
            TGZ="jogak-${pkg}-${PKG_VER}.tgz"
            EXISTS=$(npm view "@jogak/$pkg@$PKG_VER" version 2>/dev/null || true)
            if [ -n "$EXISTS" ]; then
              echo "=== skip @jogak/$pkg@$PKG_VER (already published) ==="
              continue
            fi
            if [ ! -f "$TGZ" ]; then
              echo "::error::tarball missing: $TGZ"
              exit 1
            fi
            echo "=== publishing @jogak/$pkg@$PKG_VER with --tag $DIST_TAG ==="
            npm publish "$TGZ" --access public --provenance --tag "$DIST_TAG"
          done

      - name: Promote pre-release to latest
        # beta/rc는 publish 시 자기 tag(beta/rc)로만 들어간다. 그러나 외부 사용자가
        # `pnpm add @jogak/core` (no @suffix)로 받을 때 `latest` dist-tag가 가리키는
        # 버전을 받으므로, beta/rc도 latest로 함께 promote해 install 즉시 동작시킨다.
        # stable(1.0.0) publish 후엔 그것이 latest가 되어 자연스럽게 덮어 쓴다.
        #
        # npm OIDC trusted publisher는 publish만 인증한다. dist-tag add는 별도 인증이
        # 필요하므로 NPM_TOKEN secret을 통해 ~/.npmrc에 _authToken을 set한다. secret
        # 미설정 시 step은 skip (publish는 OIDC로 이미 성공한 상태 유지).
        if: |
          (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
          && (steps.dist-tag.outputs.tag == 'beta' || steps.dist-tag.outputs.tag == 'rc')
          && env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          for pkg in core ui cli; do
            PKG_VER=$(node -p "require('/__w/jogak/jogak/packages/$pkg/package.json').version" 2>/dev/null \
              || node -p "require(\"$GITHUB_WORKSPACE/packages/$pkg/package.json\").version")
            CURRENT_LATEST=$(npm view "@jogak/$pkg" dist-tags.latest 2>/dev/null || echo "")
            if [ "$CURRENT_LATEST" = "$PKG_VER" ]; then
              echo "=== latest already @jogak/$pkg@$PKG_VER, skip ==="
              continue
            fi
            echo "=== promote @jogak/$pkg@$PKG_VER to latest (was: $CURRENT_LATEST) ==="
            npm dist-tag add "@jogak/$pkg@$PKG_VER" latest
          done
          rm -f "$HOME/.npmrc"

      - name: Warn if NPM_TOKEN not configured
        if: |
          (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
          && (steps.dist-tag.outputs.tag == 'beta' || steps.dist-tag.outputs.tag == 'rc')
          && env.NPM_TOKEN == ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::warning::NPM_TOKEN secret 미설정. beta/rc publish는 성공했지만 latest dist-tag promote는 skip됨."
          echo "::warning::수동 promote: npm dist-tag add @jogak/<pkg>@<version> latest (npm login 후)"
