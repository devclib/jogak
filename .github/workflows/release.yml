name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify versions + clean ~/.npmrc auth (OIDC fallback ліҙмһҘ)
        # Node 24лҠ” npm 11.xлҘј лҸҷлҙү вҶ’ self-upgrade л¶Ҳн•„мҡ”.
        # _authToken лқјмқёмқҙ ~/.npmrcм—җ л°•нҳҖ мһҲмңјл©ҙ OIDC fallbackмқҙ м°ЁлӢЁлҗҳлҜҖлЎң м•Ҳм „ м •лҰ¬.
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc" || true
            echo "--- ~/.npmrc after cleanup ---"
            cat "$HOME/.npmrc" || true
          else
            echo "(no ~/.npmrc)"
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist parity (no test files leaked)
        run: |
          leaked=$(find packages -path '*/dist/*' -name '*.test.*' || true)
          if [ -n "$leaked" ]; then
            echo "::error::test files leaked into dist:"
            echo "$leaked"
            exit 1
          fi

      - name: Pack all packages (workspace:* вҶ’ мӢӨм ң лІ„м „ м№ҳнҷҳ)
        # pnpm packмқҙ workspace:*лҘј нҢЁнӮӨм§Җ лІ„м „мңјлЎң м№ҳнҷҳн•ң tarballмқ„ мғқм„ұн•ңлӢӨ.
        # мқҙнӣ„ npm publishм—җ tarballмқ„ м§Ғм ‘ л„ҳкё°л©ҙ npm CLI(11+)мқҳ OIDC мқёмҰқ нқҗлҰ„мқ„ м •нҷ•нһҲ нғ„лӢӨ.
        run: |
          mkdir -p /tmp/jogak-tgz
          for pkg in core react ui web-components next cli vite-adapter next-adapter webpack-adapter standalone-adapter; do
            (cd packages/$pkg && pnpm pack --pack-destination /tmp/jogak-tgz)
          done
          ls -la /tmp/jogak-tgz

      - name: Resolve dist-tag from version
        # лІ„м „мқҳ semver prerelease identifierлЎң npm dist-tagлҘј мһҗлҸҷ кІ°м •н•ңлӢӨ.
        # 0.1.0-alpha.2 вҶ’ alpha, 1.0.0-beta.0 вҶ’ beta, 1.0.0 вҶ’ latest
        # н•ҳл“ңмҪ”л”© мӢң stable лҰҙлҰ¬мҠӨк°Җ alpha нғңк·ёлЎң мҳ¬лқјк°Җ latestлҘј к°ұмӢ  лӘ» н•ҳлҠ” мӮ¬кі  л°©м§Җ.
        id: dist-tag
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          case "$VERSION" in
            *-alpha.*) TAG=alpha ;;
            *-beta.*)  TAG=beta ;;
            *-rc.*)    TAG=rc ;;
            *-*)       TAG=next ;;
            *)         TAG=latest ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "Resolved: $VERSION вҶ’ dist-tag=$TAG"

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          cd /tmp/jogak-tgz
          VERSION=${{ steps.dist-tag.outputs.version }}
          for pkg in core react ui web-components next cli vite-adapter next-adapter webpack-adapter standalone-adapter; do
            echo "=== dry-run: @jogak/$pkg ==="
            npm publish "jogak-${pkg}-${VERSION}.tgz" --access public --provenance --tag '${{ steps.dist-tag.outputs.tag }}' --dry-run
          done

      - name: Publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: |
          cd /tmp/jogak-tgz
          VERSION=${{ steps.dist-tag.outputs.version }}
          # мқҳмЎҙм„ұ мҲңм„ң: core вҶ’ react вҶ’ ui вҶ’ web-components вҶ’ next вҶ’ cli вҶ’ 4 adapters
          # м •нҷ•н•ң filename мӮ¬мҡ© вҖ” 'jogak-next-*.tgz' к°ҷмқҖ globмқҖ 'next-adapter'мҷҖ лӢӨмӨ‘ л§Өм№ҳлҗҳм–ҙ
          # npm publish EUSAGE л°ңмғқ (м•ҢнҢҢ.9.1 мӮ¬кі ).
          for pkg in core react ui web-components next cli vite-adapter next-adapter webpack-adapter standalone-adapter; do
            echo "=== publishing @jogak/$pkg with --tag ${{ steps.dist-tag.outputs.tag }} ==="
            npm publish "jogak-${pkg}-${VERSION}.tgz" --access public --provenance --tag '${{ steps.dist-tag.outputs.tag }}'
          done
