name: ✨ Feature request
description: 새 기능 · API · 옵션 제안
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        beta 진입 전이라 API는 신중하게 추가됩니다. 단순 "있으면 좋겠다"보다는
        **해결하고 싶은 문제**와 **현재 우회 방법**을 먼저 적어 주시면 채택 가능성이 높아집니다.

  - type: textarea
    id: motivation
    attributes:
      label: 해결하고 싶은 문제 (Motivation)
      description: 왜 이 기능이 필요한가요? 현재 어떤 작업이 어려운가요?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 API · 동작
      description: 예시 코드, config 옵션 이름, CLI 플래그 형태 등
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 현재 우회 방법 / 검토한 대안
      description: 어떤 방법으로 우회 중이거나, 어떤 대안을 검토했고 왜 부족한지

  - type: dropdown
    id: scope
    attributes:
      label: 영향 범위
      multiple: true
      options:
        - "@jogak/core (registry · vite plugin · ts-morph extractor)"
        - "@jogak/ui (Sidebar · Preview · Controls)"
        - "@jogak/cli (jogak dev/build/generate)"
        - "framework renderer (react/next/vue/svelte/wc)"
        - "builder adapter (vite/next/webpack/standalone)"
        - "문서 · examples"

  - type: textarea
    id: additional
    attributes:
      label: 추가 컨텍스트
